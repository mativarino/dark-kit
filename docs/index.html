<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark-Kit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .background {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 80%);
    }

    .laser {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff6a00, transparent);
      box-shadow: 0 0 12px #ff6a00;
      opacity: 0.25;
      animation: laserMove linear infinite;
    }

    @keyframes laserMove {
      from { transform: translateX(-100%); }
      to { transform: translateX(300vw); }
    }

    .status-bar {
      background: #000;
      color: #fff;
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      border-bottom: 1px solid #222;
    }

    .hamburger {
      position: fixed;
      top: 8px;
      left: 20px;
      font-size: 28px;
      cursor: pointer;
      z-index: 500;
      color: white;
      display: none;
    }

    .sidebar {
      width: 280px;
      background: rgba(17,17,17,0.98);
      border-right: 1px solid #222;
      position: fixed;
      top: 45px;
      bottom: 0;
      left: 0;
      z-index: 200;
      transition: transform 0.4s ease;
      display: flex;
      flex-direction: column;
    }
    .sidebar.closed { transform: translateX(-100%); }

    .nav a {
      display: block;
      padding: 13px 18px;
      color: #ccc;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .nav a:hover, .nav a.active { background: #1f1f1f; color: white; }

    .main {
      flex: 1;
      margin-left: 280px;
      overflow-y: auto;
      padding: 30px;
      transition: margin-left 0.4s ease;
    }
    .main.full { margin-left: 0; }

    .section { display: none; }
    .section.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .card, .app-card, .lobby-card {
      background: #141414;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card:hover, .app-card:hover, .lobby-card:hover {
      transform: translateY(-8px);
      border-color: #ff6a00;
    }
  </style>
</head>
<body>

  <div class="background" id="background"></div>

  <div class="status-bar">
    <div id="live-time"></div>
    <div>100% • ☁️ 70°F</div>
  </div>

  <div class="hamburger" onclick="toggleSidebar()">☰</div>

  <div class="sidebar" id="sidebar">
    <span onclick="toggleSidebar()" style="position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;color:#aaa;">✕</span>

    <div style="padding:25px 20px;text-align:center;font-size:38px;font-weight:700;color:white;">
      DARK-KIT
    </div>

    <div class="nav">
      <a onclick="switchTab(0)" class="active">🏠 Lobby</a>
      <a onclick="switchTab(1)">🌐 Browser</a>
      <a onclick="switchTab(2)">📱 Apps</a>
      <a onclick="switchTab(3)">🎮 Games</a>
      <a onclick="switchTab(4)">🎥 Movies</a>
      <a onclick="switchTab(5)">🌸 Anime</a>
      <a onclick="switchTab(6)">💬 Chat</a>
    </div>
  </div>

  <div class="main" id="main-content">

    <section class="section active" id="tab0">
      <div style="text-align:center;padding:60px 20px;">
        <h1 style="font-size:3.8rem;margin-bottom:10px;background:linear-gradient(90deg,#ff6a00,#ff9d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
          Welcome to Dark-Kit
        </h1>
        <p style="font-size:1.4rem;color:#aaa;">What would you like to do?</p>
        
        <div class="grid" style="margin-top:50px;">
          <div class="lobby-card" onclick="switchTab(1)"><h3>🌐 Browser</h3><p>Surf freely</p></div>
          <div class="lobby-card" onclick="switchTab(2)"><h3>📱 Apps</h3><p>Popular apps</p></div>
          <div class="lobby-card" onclick="switchTab(3)"><h3>🎮 Games</h3><p>Unblocked games</p></div>
          <div class="lobby-card" onclick="switchTab(4)"><h3>🎥 Movies</h3><p>Watch movies</p></div>
          <div class="lobby-card" onclick="switchTab(5)"><h3>🌸 Anime</h3><p>Watch anime</p></div>
          <div class="lobby-card" onclick="switchTab(6)"><h3>💬 Chat</h3><p>Community chat</p></div>
        </div>
      </div>
    </section>

  </div>

  <script>
    function getEl(id) { return document.getElementById(id); }

    function createLasers() {
      const bg = getEl('background');
      if (!bg) return;
      for (let i = 0; i < 16; i++) {
        const laser = document.createElement('div');
        laser.className = 'laser';
        laser.style.top = Math.random() * 100 + '%';
        laser.style.width = (Math.random() * 600 + 200) + 'px';
        laser.style.animationDuration = (Math.random() * 15 + 8) + 's';
        laser.style.animationDelay = '-' + (Math.random() * 20) + 's';
        bg.appendChild(laser);
      }
    }

    function updateClock() {
      const timeEl = getEl('live-time');
      if (!timeEl) return;
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      timeEl.textContent = `${hours}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm}`;
    }

    function toggleSidebar() {
      const sidebar = getEl('sidebar');
      const main = getEl('main-content');
      if (sidebar) sidebar.classList.toggle('closed');
      if (main) main.classList.toggle('full');
    }

    function switchTab(n) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const tab = getEl('tab' + n);
      if (tab) tab.classList.add('active');
    }

    window.onload = () => {
      createLasers();
      setInterval(updateClock, 1000);
      updateClock();
    };
  </script>
</body>
</html>
